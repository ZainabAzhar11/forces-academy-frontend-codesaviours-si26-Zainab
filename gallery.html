<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | Forces Academy</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

<!-- GLightbox CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f7f5ed;
}

/* Navbar */
.navbar {
    background: #071f3d;
}
.navbar-brand {color:white!important; font-size:28px; font-weight:900;}
.nav-link {color:white!important; font-weight:600; margin:0 8px;}
.nav-link:hover {color:#ffc107!important;}
.nav-link.active::after {
    content: '';
    position: absolute;
    bottom: -5px;
    left: 0;
    width: 100%;
    height: 3px;
    background: #ffc107;
    border-radius: 3px;
}

/* Hero */
.hero {
    height: 350px;
    background: linear-gradient(rgba(7,31,61,.7), rgba(7,31,61,.7)),
       url('https://images.unsplash.com/photo-1564981797816-1043664bf78d?w=1600')
       center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
    animation: heroSlide 1s ease;
}
.hero h1 {font-size:48px; font-weight:900; color:#ffc107;}
.hero p {font-size:18px;}

/* Hero animation */
@keyframes heroSlide {
    from {opacity:0; transform:translateY(-50px);}
    to {opacity:1; transform:translateY(0);}
}

/* Gallery Filter Buttons */
.filter-btn {
    border:none;
    background:#071f3d;
    color:white;
    padding:10px 20px;
    border-radius:25px;
    font-weight:600;
    margin:5px;
    transition:.3s;
}
.filter-btn:hover,
.filter-btn.active {
    background:#ffc107;
    color:#000;
}

/* Gallery cards */
.gallery-item {
    position: relative;
    border-radius:15px;
    overflow:hidden;
    height:250px;
    box-shadow:0 12px 30px rgba(0,0,0,0.1);
    background:white;
}
.gallery-item img {
    width:100%;
    height:100%;
    object-fit:cover;
    transition: transform .5s;
}
.gallery-item:hover img {
    transform: scale(1.1);
}
.gallery-label {
    position:absolute;
    bottom:8px;
    left:8px;
    background:rgba(0,0,0,0.6);
    color:white;
    padding:4px 10px;
    font-size:12px;
    border-radius:5px;
}

/* Make GLightbox arrows visible on mobile */
.glightbox-arrow {
    display:flex !important;
    width: 45px !important;
    height: 45px !important;
    align-items:center !important;
    justify-content:center !important;
    background: rgba(0,0,0,0.5) !important;
}
.glightbox-arrow::after {
    font-size:1.7rem !important;
    color:#ffc107 !important;
}

/* Prevent horizontal scroll */
.glightbox-container .gslide {overflow:hidden !important;}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">🎓 Forces Academy</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li><a class="nav-link" href="index.html">Home</a></li>
        <li><a class="nav-link" href="about.html">About</a></li>
        <li><a class="nav-link" href="courses.html">Courses</a></li>
        <li><a class="nav-link" href="admissions.html">Admissions</a></li>
        <li><a class="nav-link active" href="gallery.html">Gallery</a></li>
        <li><a class="nav-link" href="results.html">Results</a></li>
        <li><a class="nav-link" href="contact.html">Contact</a></li>
        <li><a class="portal-btn" href="student-portal.html">Student Portal</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <div>
    <h1>Photo Gallery</h1>
    <p>A glimpse of academy moments, training, events, and achievements.</p>
  </div>
</section>

<!-- Filters -->
<section class="py-5">
  <div class="container">
    <h2 class="text-center" style="font-weight:900; color:#071f3d;">Explore Moments</h2>
    <div class="text-center mt-3">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="events">Events</button>
      <button class="filter-btn" data-filter="sports">Sports</button>
      <button class="filter-btn" data-filter="academic">Academic</button>
    </div>

    <!-- Gallery Grid -->
    <div class="row g-3 mt-4" id="gallery">
      <!-- PLACE YOUR IMAGE ITEMS HERE -->
      <!-- Example Row -->
      <div class="col-lg-3 col-md-6 col-12 gallery-box" data-category="events">
        <a href="https://images.unsplash.com/photo-1564981797816-1043664bf78d?w=1200" class="glightbox">
          <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1564981797816-1043664bf78d?w=600" alt="Event Image">
            <span class="gallery-label">EVENTS</span>
          </div>
        </a>
      </div>
      <div class="col-lg-3 col-md-6 col-12 gallery-box" data-category="sports">
        <a href="https://images.unsplash.com/photo-1596495577886-d920f1fb314d?w=1200" class="glightbox">
          <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1596495577886-d920f1fb314d?w=600" alt="Sports Image">
            <span class="gallery-label">SPORTS</span>
          </div>
        </a>
      </div>
      <div class="col-lg-3 col-md-6 col-12 gallery-box" data-category="academic">
        <a href="https://images.unsplash.com/photo-1523240795612-9a054b0db644?w=1200" class="glightbox">
          <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644?w=600" alt="Academic Image">
            <span class="gallery-label">ACADEMIC</span>
          </div>
        </a>
      </div>
      <div class="col-lg-3 col-md-6 col-12 gallery-box" data-category="events">
        <a href="https://images.unsplash.com/photo-1551836022-d5d88e9218df?w=1200" class="glightbox">
          <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1551836022-d5d88e9218df?w=600" alt="Event Image 2">
            <span class="gallery-label">EVENTS</span>
          </div>
        </a>
      </div>

      <!-- Add more gallery items as you like -->
    </div>

  </div>
</section>

<!-- GLightbox + Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>

<script>
// Initialize GLightbox
const lightbox = GLightbox({
  selector: '.glightbox',
  touchNavigation: true,
  loop: true,
  openEffect: 'zoom',
  closeEffect: 'fade'
});

// Filter functionality
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const category = btn.getAttribute('data-filter');
    document.querySelectorAll('.gallery-box').forEach(item=>{
      item.style.display = (category === 'all' || item.dataset.category === category) ? 'block' : 'none';
    });
  });
});
</script>

</body>
</html>
